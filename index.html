<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de leituras de imagens na webcam</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .controls, .io-areas {
            display: flex;
            gap: 10px;
            align-items: center;
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .io-areas {
            flex-direction: column;
            align-items: stretch;
        }
        textarea {
            width: 300px;
            height: 80px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        #videoFeed {
            width: 480px;
            height: 360px;
            border: 2px solid #333;
            background-color: #000;
            border-radius: 8px;
        }
        #startButton {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            color: white;
        }
        #startButton.start {
            background-color: #28a745; /* Green */
        }
        #startButton.stop {
            background-color: #dc3545; /* Red */
        }
        label {
            font-weight: bold;
        }
        select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        input[type="number"] {
            width: 90px;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .status-text {
            font-size: 13px;
            font-weight: bold;
        }
        .status-online {
            color: #218838;
        }
        .status-offline {
            color: #b02a37;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <h1>Integração de webcam com SmolVLM</h1>

    <video id="videoFeed" autoplay playsinline></video>
    <canvas id="canvas" class="hidden"></canvas> <!-- For capturing frames -->

    <div class="io-areas">
        <div>
            <label for="baseURL">Base API:</label><br>
            <input id="baseURL" name="Instruction" value="http://localhost:8080">
        </div>
        <div>
            <label for="instructionText">Instruction:</label><br>
            <textarea id="instructionText" style="height: 2em; width: 40em" name="Instruction"></textarea>
        </div>
        <div>
            <label for="responseText">Response:</label><br>
            <textarea id="responseText" style="height: 2em; width: 40em" name="Response" readonly placeholder="Server response will appear here..."></textarea>
        </div>
    </div>

    <div class="controls">
        <label for="intervalSelect">Interval between 2 requests:</label>
        <select id="intervalSelect" name="Interval between 2 requests">
            <option value="100">100ms</option>
            <option value="250">250ms</option>
            <option value="500" selected>500ms</option>
            <option value="1000">1s</option>
            <option value="2000">2s</option>
        </select>
        <label for="maxInputTokens">Max input tokens (approx):</label>
        <input id="maxInputTokens" type="number" min="16" max="2048" step="16" value="256">
        <label for="maxOutputTokens">Max output tokens:</label>
        <input id="maxOutputTokens" type="number" min="16" max="1024" step="16" value="100">
        <label for="translateInputToggle">
            <input type="checkbox" id="translateInputToggle" name="Translate prompt to English">
            Translate prompt PT-BR -> EN
        </label>
        <label for="translateToggle">
            <input type="checkbox" id="translateToggle" name="Translate to Portuguese">
            Translate response to PT-BR
        </label>
        <span id="translatorStatus" class="status-text status-offline">Translator: checking...</span>
        <button id="startButton" class="start">Start</button>
    </div>

    <script>
        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('canvas');
        const baseURL = document.getElementById('baseURL');
        const instructionText = document.getElementById('instructionText');
        const responseText = document.getElementById('responseText');
        const intervalSelect = document.getElementById('intervalSelect');
        const maxInputTokens = document.getElementById('maxInputTokens');
        const maxOutputTokens = document.getElementById('maxOutputTokens');
        const translateInputToggle = document.getElementById('translateInputToggle');
        const translateToggle = document.getElementById('translateToggle');
        const translatorStatus = document.getElementById('translatorStatus');
        const startButton = document.getElementById('startButton');

        instructionText.value = "What do you see?"; // default instruction
        baseURL.value = (window.location.origin && window.location.origin !== 'null')
            ? window.location.origin
            : "http://localhost:8080";

        let stream;
        let intervalId;
        let isProcessing = false;
        let isRequestInFlight = false;
        let workingStrategyId = null;
        let translatorStatusIntervalId = null;
        const translationCache = new Map();

        function parseIntInRange(value, fallback, minValue, maxValue) {
            const parsed = parseInt(value, 10);
            if (Number.isNaN(parsed)) return fallback;
            return Math.min(maxValue, Math.max(minValue, parsed));
        }

        function getModelSettings() {
            return {
                inputTokenLimit: parseIntInRange(maxInputTokens.value, 256, 16, 2048),
                outputTokenLimit: parseIntInRange(maxOutputTokens.value, 100, 16, 1024),
            };
        }

        function tokenizeApprox(text) {
            const normalized = (text || '').trim();
            if (!normalized) return [];
            return normalized.split(/\s+/);
        }

        function truncateByApproxTokens(text, maxTokens) {
            const chunks = tokenizeApprox(text);
            if (chunks.length <= maxTokens) {
                return { text, truncated: false };
            }
            return {
                text: chunks.slice(0, maxTokens).join(' '),
                truncated: true,
            };
        }

        function setTranslatorStatus(isOnline, detail = '') {
            translatorStatus.classList.remove('status-online', 'status-offline');
            translatorStatus.classList.add(isOnline ? 'status-online' : 'status-offline');
            translatorStatus.textContent = isOnline
                ? 'Translator: online'
                : `Translator: offline${detail ? ` (${detail})` : ''}`;
        }

        function extractResponseText(data) {
            if (!data || typeof data !== 'object') return null;

            const messageContent = data?.choices?.[0]?.message?.content;
            if (typeof messageContent === 'string' && messageContent.trim()) return messageContent;

            if (Array.isArray(messageContent)) {
                const textParts = messageContent
                    .map((part) => part?.text)
                    .filter((text) => typeof text === 'string' && text.trim());
                if (textParts.length > 0) return textParts.join('\n');
            }

            const choiceText = data?.choices?.[0]?.text;
            if (typeof choiceText === 'string' && choiceText.trim()) return choiceText;

            if (typeof data?.content === 'string' && data.content.trim()) return data.content;
            if (typeof data?.response === 'string' && data.response.trim()) return data.response;

            return null;
        }

        function normalizeBaseUrl() {
            return baseURL.value.replace(/\/+$/, '');
        }

        async function fetchServerProps(base) {
            try {
                const res = await fetch(`${base}/props`);
                if (!res.ok) return null;
                return await res.json();
            } catch (_) {
                return null;
            }
        }

        async function refreshTranslatorStatus() {
            const base = normalizeBaseUrl();
            try {
                const response = await fetch(`${base}/translator-healthz`, { method: 'GET' });
                if (!response.ok) {
                    setTranslatorStatus(false, `HTTP ${response.status}`);
                    return;
                }
                setTranslatorStatus(true);
            } catch (_) {
                setTranslatorStatus(false);
            }
        }

        async function translateText(text, source, target) {
            const base = normalizeBaseUrl();
            const normalized = text.trim();
            if (!normalized) return text;
            const cacheKey = `${source}->${target}:${normalized}`;

            if (translationCache.has(cacheKey)) {
                return translationCache.get(cacheKey);
            }

            const response = await fetch(`${base}/translate`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    q: normalized,
                    source: source,
                    target: target,
                    format: 'text'
                })
            });

            if (!response.ok) {
                const errText = await response.text();
                setTranslatorStatus(false, `HTTP ${response.status}`);
                throw new Error(`Translator error ${response.status}: ${errText}`);
            }

            const data = await response.json();
            const translated = typeof data?.translatedText === 'string' && data.translatedText.trim()
                ? data.translatedText
                : text;

            translationCache.set(cacheKey, translated);
            setTranslatorStatus(true);
            return translated;
        }

        async function translateEnglishToPortuguese(text) {
            return translateText(text, 'en', 'pt');
        }

        // Returns response text (string)
        async function sendChatCompletionRequest(instruction, imageBase64URL, outputTokenLimit) {
            const base = normalizeBaseUrl();
            const rawImageBase64 = (imageBase64URL.split(',')[1] || imageBase64URL).trim();

            const strategies = [
                {
                    id: 'chat-openai',
                    path: '/v1/chat/completions',
                    body: {
                        max_tokens: outputTokenLimit,
                        messages: [
                            {
                                role: 'user',
                                content: [
                                    { type: 'text', text: instruction },
                                    { type: 'image_url', image_url: { url: imageBase64URL } }
                                ]
                            }
                        ]
                    }
                },
                {
                    id: 'chat-media-marker',
                    path: '/v1/chat/completions',
                    body: {
                        max_tokens: outputTokenLimit,
                        messages: [
                            {
                                role: 'user',
                                content: [
                                    { type: 'text', text: `<__media__>\n${instruction}` },
                                    { type: 'image_url', image_url: { url: imageBase64URL } }
                                ]
                            }
                        ]
                    }
                },
                {
                    id: 'chat-image-marker',
                    path: '/v1/chat/completions',
                    body: {
                        max_tokens: outputTokenLimit,
                        messages: [
                            {
                                role: 'user',
                                content: [
                                    { type: 'text', text: `<image>\n${instruction}` },
                                    { type: 'image_url', image_url: { url: imageBase64URL } }
                                ]
                            }
                        ]
                    }
                },
                {
                    id: 'completion-media-marker',
                    path: '/completion',
                    body: {
                        prompt: {
                            prompt_string: `<__media__>\n${instruction}`,
                            multimodal_data: [rawImageBase64]
                        },
                        n_predict: outputTokenLimit
                    }
                },
                {
                    id: 'completion-image-marker',
                    path: '/completion',
                    body: {
                        prompt: {
                            prompt_string: `<image>\n${instruction}`,
                            multimodal_data: [rawImageBase64]
                        },
                        n_predict: outputTokenLimit
                    }
                }
            ];
            const attemptStrategy = async (strategy) => {
                try {
                    const response = await fetch(`${base}${strategy.path}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(strategy.body)
                    });

                    const raw = await response.text();
                    let parsed;
                    try {
                        parsed = JSON.parse(raw);
                    } catch (_) {
                        parsed = null;
                    }

                    if (!response.ok) {
                        const errMsg = parsed?.error?.message || raw || `HTTP ${response.status}`;
                        return { ok: false, error: `[${strategy.id}] ${response.status}: ${errMsg}` };
                    }

                    const text = extractResponseText(parsed);
                    if (text) return { ok: true, text };
                    if (raw && raw.trim()) return { ok: true, text: raw };

                    return { ok: false, error: `[${strategy.id}] Success response without readable text` };
                } catch (error) {
                    return { ok: false, error: `[${strategy.id}] ${error.message}` };
                }
            };

            // Keep behavior close to original: once a strategy works, use only that one.
            if (workingStrategyId) {
                const strategy = strategies.find((s) => s.id === workingStrategyId);
                if (strategy) {
                    const result = await attemptStrategy(strategy);
                    if (result.ok) return result.text;
                    return `Server error (${workingStrategyId}): ${result.error}`;
                }
            }

            // One-time discovery for compatibility with different llama.cpp/template versions.
            const attemptErrors = [];
            for (const strategy of strategies) {
                const result = await attemptStrategy(strategy);
                if (result.ok) {
                    workingStrategyId = strategy.id;
                    return result.text;
                }
                attemptErrors.push(result.error);
            }

            const serverProps = await fetchServerProps(base);
            const templateRaw = serverProps?.chat_template;
            const template = typeof templateRaw === 'string'
                ? `${templateRaw.replace(/\s+/g, ' ').slice(0, 80)}${templateRaw.length > 80 ? '...' : ''}`
                : 'unknown';
            const details = attemptErrors.length > 0 ? attemptErrors.join('\n') : 'Unknown error';
            return `Server error during compatibility check.\nServer chat_template: ${template}\n${details}\nTip: run llama-server with a recent llama.cpp build and --chat-template smolvlm`;
        }

        // 1. Ask for camera permission on load
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
                responseText.value = "Camera access granted. Ready to start.";
            } catch (err) {
                console.error("Error accessing camera:", err);
                responseText.value = `Error accessing camera: ${err.name} - ${err.message}. Please ensure permissions are granted and you are on HTTPS or localhost.`;
                alert(`Error accessing camera: ${err.name}. Make sure you've granted permission and are on HTTPS or localhost.`);
            }
        }

        function captureImage() {
            if (!stream || !video.videoWidth) {
                console.warn("Video stream not ready for capture.");
                return null;
            }
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.8); // Use JPEG for smaller size, 0.8 quality
        }

        async function sendData() {
            if (!isProcessing) return; // Ensure we don't have overlapping requests if processing takes longer than interval
            if (isRequestInFlight) return;

            isRequestInFlight = true;

            const instruction = instructionText.value;
            const imageBase64URL = captureImage();
            const modelSettings = getModelSettings();
            maxInputTokens.value = String(modelSettings.inputTokenLimit);
            maxOutputTokens.value = String(modelSettings.outputTokenLimit);

            let instructionForModel = instruction;
            let inputTranslated = false;
            let inputTranslateError = null;

            if (translateInputToggle.checked && instructionForModel.trim()) {
                try {
                    instructionForModel = await translateText(instructionForModel, 'pt', 'en');
                    inputTranslated = true;
                } catch (translateError) {
                    inputTranslateError = translateError;
                }
            }

            const limitedInstruction = truncateByApproxTokens(instructionForModel, modelSettings.inputTokenLimit);

            if (!imageBase64URL) {
                responseText.value = "Failed to capture image. Stream might not be active.";
                // Optionally stop processing if image capture fails consistently
                // handleStop();
                isRequestInFlight = false;
                return;
            }

            const payload = {
                instruction: limitedInstruction.text,
                imageBase64URL: imageBase64URL
            };

            try {
                const modelResponse = await sendChatCompletionRequest(
                    payload.instruction,
                    payload.imageBase64URL,
                    modelSettings.outputTokenLimit
                );

                const shouldTranslate =
                    translateToggle.checked &&
                    typeof modelResponse === 'string' &&
                    !modelResponse.startsWith('Server error') &&
                    !modelResponse.startsWith('Error:');

                if (shouldTranslate) {
                    try {
                        responseText.value = await translateEnglishToPortuguese(modelResponse);
                    } catch (translateError) {
                        console.warn('Translation failed, showing original response:', translateError);
                        responseText.value = `${modelResponse}\n\n[Translation unavailable: ${translateError.message}]`;
                    }
                } else {
                    responseText.value = modelResponse;
                }

                if (limitedInstruction.truncated && typeof responseText.value === 'string') {
                    responseText.value = `${responseText.value}\n\n[Input truncated to ~${modelSettings.inputTokenLimit} tokens]`;
                }

                if (inputTranslated && typeof responseText.value === 'string') {
                    responseText.value = `${responseText.value}\n\n[Input translated PT->EN]`;
                }

                if (inputTranslateError && typeof responseText.value === 'string') {
                    responseText.value = `${responseText.value}\n\n[Input translation unavailable: ${inputTranslateError.message}]`;
                }
            } catch (error) {
                console.error('Error sending data:', error);
                responseText.value = `Error: ${error.message}`;
            } finally {
                isRequestInFlight = false;
            }
        }

        function handleStart() {
            if (!stream) {
                responseText.value = "Camera not available. Cannot start.";
                alert("Camera not available. Please grant permission first.");
                return;
            }
            isProcessing = true;
            startButton.textContent = "Stop";
            startButton.classList.remove('start');
            startButton.classList.add('stop');

            instructionText.disabled = true;
            intervalSelect.disabled = true;
            maxInputTokens.disabled = true;
            maxOutputTokens.disabled = true;
            translateInputToggle.disabled = true;

            responseText.value = "Processing started...";

            const intervalMs = parseInt(intervalSelect.value, 10);
            
            // Initial immediate call
            sendData(); 
            
            // Then set interval
            intervalId = setInterval(sendData, intervalMs);
        }

        function handleStop() {
            isProcessing = false;
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            startButton.textContent = "Start";
            startButton.classList.remove('stop');
            startButton.classList.add('start');

            instructionText.disabled = false;
            intervalSelect.disabled = false;
            maxInputTokens.disabled = false;
            maxOutputTokens.disabled = false;
            translateInputToggle.disabled = false;
            if (responseText.value.startsWith("Processing started...")) {
                responseText.value = "Processing stopped.";
            }
        }

        startButton.addEventListener('click', () => {
            if (isProcessing) {
                handleStop();
            } else {
                handleStart();
            }
        });

        baseURL.addEventListener('change', () => {
            refreshTranslatorStatus();
        });

        // Initialize camera when the page loads
        window.addEventListener('DOMContentLoaded', () => {
            initCamera();
            refreshTranslatorStatus();
            translatorStatusIntervalId = setInterval(refreshTranslatorStatus, 10000);
        });

        // Optional: Stop stream when page is closed/navigated away to release camera
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (intervalId) {
                clearInterval(intervalId);
            }
            if (translatorStatusIntervalId) {
                clearInterval(translatorStatusIntervalId);
            }
        });

    </script>
</body>
</html>
